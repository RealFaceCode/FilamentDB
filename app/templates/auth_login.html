{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto ui-card ui-card-lg">
  <h2 class="text-xl font-semibold mb-2">{{ t('login_title') }}</h2>
  <p class="text-sm text-slate-500 mb-5">{{ t('login_hint') }}</p>

  {% if message %}
    <div class="ui-alert-warning mb-4">{{ message }}</div>
  {% endif %}

  <form method="post" action="/auth/login" class="grid grid-cols-1 gap-4">
    <input type="hidden" name="next_url" value="{{ next_url if next_url is defined else '/dashboard' }}">
    <div>
      <label for="login-email" class="text-xs text-slate-500">{{ t('auth_email') }}</label>
      <input id="login-email" name="email" type="email" required class="ui-input" value="{{ prefill_email if prefill_email is defined else '' }}">
    </div>
    <div>
      <label for="login-password" class="text-xs text-slate-500">{{ t('auth_password') }}</label>
      <input id="login-password" name="password" type="password" required class="ui-input">
    </div>
    <div class="flex items-center gap-3 pt-1">
      <button class="ui-btn ui-btn-primary">{{ t('auth_submit_login') }}</button>
      <a href="/auth/register" class="ui-btn ui-btn-secondary">{{ t('landing_cta_register') }}</a>
    </div>
  </form>
</div>
{% endblock %}
